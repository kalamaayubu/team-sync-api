services:
  prisma-studio:
    build: .
    # We explicitly inject the URL here using the service name 'db'
    command: npx prisma studio --browser none --port 5555 --url postgresql://admin:secret@db:5432/mydatabase
    ports:
      - "5555:5555"
    depends_on:
      - db
  db:
    image: postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=mydatabase
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db #Start the DB first
    env_file:
      - .env
